}

.logo {

    color: #1A1A1A;
    text-decoration: none;
    letter-spacing: -0.5px;

}

.nav-links {
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    margin-left: auto !important; /* ЭТО ПРИНУДИТЕЛЬНО ТОЛКАЕТ КНОПКИ ВПРАВО */
}

.nav-links a {
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    color: #6B6863;
    margin-left: 3rem !important; /* Расстояние МЕЖДУ кнопками */
    transition: all 0.4s ease;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    position: relative;
    padding-bottom: 4px;
    white-space: nowrap !important;
}

.nav-links a:hover, 
.nav-links a.active {
    color: #1A1A1A !important;
}

/* Линия при наведении */
.nav-links a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 1px;
    bottom: 0;
    left: 0;
    background-color: #1A1A1A;
    transition: width 0.4s ease;
}

.nav-links a:hover::after,
.nav-links a.active::after {
    width: 100% !important;
}
        .container {

        .tabs {

            gap: 1rem;

            flex-wrap: wrap;

        .tab-btn {
            background: transparent;

            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
            padding: 0.8rem 2rem;

            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));

            box-shadow: var(--shadow-hover);

            background: var(--accent-light);

        .btn-group {

            flex-wrap: wrap;

        .btn {

            font-size: 0.9rem;
            color: var(--text-muted);

        .hint-text.show { display: block; animation: slideDown 0.3s; }

        .calc-section {
            background: var(--card-bg);
            border-radius: var(--radius-lg);

        .calc-input, .calc-select {
            width: 100%;
            padding: 1.2rem;
            border-radius: var(--radius-sm);
            border: 1px solid #E0DCD6;
            background: var(--bg-main);

        .calc-input:focus, .calc-select:focus {

            border-radius: var(--radius-sm);

            color: var(--text-main);

        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }

        @media (max-width: 900px) {

            .calc-section { padding: 2rem; }
            .navbar { flex-direction: column; padding: 1rem; gap: 1rem; }
            .nav-links a { margin: 0 1rem; }
        }
    </style>
</head>

    <script>
        // Функция для принудительного рендеринга формул
        function renderMath() {
            if (window.MathJax) {
                MathJax.typesetPromise().catch(err => console.log('MathJax error:', err));
            }
        }

        // Вспомогательная функция для сочетаний
        function C(n, k) {
            if(k<0 || k>n) return 0;
            let res=1;
            for(let i=1; i<=k; i++) res = res * (n - i + 1) / i;
            return res;
        }

        // ---------- ЗАДАЧИ ПО ТЕМАМ ----------
        const topicTasks = [
            { topic: "Комбинаторика", question: "Сколькими способами можно составить код из 4 цифр для ячейки камеры хранения (цифры от 0 до 9)?", answer: "10 000", solution: "На каждую из 4 позиций можно поставить любую из 10 цифр. По правилу умножения: $$N = 10 \\cdot 10 \\cdot 10 \\cdot 10 = 10^4 = 10\\,000.$$" },
            { topic: "Комбинаторика", question: "На полке стоят 4 книги по математике, 2 по физике и 3 по химии. Сколько способов выбрать книгу не по химии?", answer: "6", solution: "Книг не по химии: $4+2=6$. По правилу сложения (выбор одной книги) – 6 способов." },
            { topic: "Комбинаторика", question: "Сколько различных трёхзначных чисел можно составить из цифр 1, 2, 3 без повторений?", answer: "6", solution: "Все три цифры различны, порядок важен – используем перестановки: $$P_3 = 3! = 3\\cdot2\\cdot1 = 6.$$" },
            { topic: "Комбинаторика", question: "Из 15 книг нужно выбрать 3 для поездки. Сколькими способами это можно сделать?", answer: "455", solution: "Порядок выбора не имеет значения – используем сочетания: $$C_{15}^3 = \\frac{15!}{3!12!} = \\frac{15\\cdot14\\cdot13}{1\\cdot2\\cdot3} = 455.$$" },
            { topic: "Классическая вероятность", question: "Бросают одну игральную кость. Какова вероятность выпадения чётного числа очков?", answer: "0.5", solution: "Всего исходов $n=6$, благоприятных $m=3$ (2,4,6). $$P = \\frac{3}{6} = 0.5.$$" },
            { topic: "Геометрическая вероятность", question: "Два человека договорились встретиться между 12:00 и 13:00. Каждый ждёт другого 5 минут. Найти вероятность встречи.", answer: "≈ 0.1597", solution: "Область встречи – квадрат 60×60. Условие встречи $|x-y|\\le5$. Площадь полосы: $60^2 - 55^2 = 575$. $$P = \\frac{575}{3600} \\approx 0.1597.$$" },
            { topic: "Теорема сложения", question: "Вероятность попадания первого стрелка 0.6, второго – 0.8. Найти вероятность того, что мишень будет поражена хотя бы один раз.", answer: "0.92", solution: "События независимы. Вероятность промаха обоих: $$P = 1 - (1-0.6)(1-0.8) = 1 - 0.4\\cdot0.2 = 0.92.$$" },
            { topic: "Теорема умножения", question: "В урне 2 белых и 3 чёрных шара. Вынимают два шара последовательно без возвращения. Найти вероятность того, что оба окажутся белыми.", answer: "0.1", solution: "$$P = \\frac{2}{5} \\cdot \\frac{1}{4} = \\frac{2}{20} = 0.1.$$" },
            { topic: "Формула полной вероятности", question: "В первой урне 3 белых и 2 чёрных шара, во второй – 4 белых и 4 чёрных. Из наудачу выбранной урны берут шар. Найти вероятность того, что он белый.", answer: "0.55", solution: "Гипотезы: $H_1$ – выбрана 1-я урна, $H_2$ – 2-я. $P(H_1)=P(H_2)=0.5$. Условные вероятности: $P(A|H_1)=3/5=0.6$, $P(A|H_2)=4/8=0.5$. $$P(A)=0.5\\cdot0.6+0.5\\cdot0.5=0.55.$$" },
            { topic: "Формула Байеса", question: "Из тех же урн (см. предыдущую задачу) вынули белый шар. Какова вероятность того, что он был извлечен из первой урны?", answer: "≈ 0.5455", solution: "По формуле Байеса: $$P(H_1|A)=\\frac{P(H_1)P(A|H_1)}{P(A)}=\\frac{0.5\\cdot0.6}{0.55}=\\frac{0.3}{0.55}\\approx0.5455.$$" },
            { topic: "Схема Бернулли", question: "Монету бросают 5 раз. Найти вероятность выпадения ровно 3 орлов.", answer: "0.3125", solution: "$$P_5(3)=C_5^3\\cdot(0.5)^3\\cdot(0.5)^2 = 10\\cdot\\frac{1}{32}=0.3125.$$" },
            { topic: "Схема Бернулли", question: "Вероятность выигрыша по одному билету равна 0.3. Куплено 15 билетов. Найти наивероятнейшее число выигрышей.", answer: "4 или 5", solution: "Используем формулу $np-q \\le k_0 \\le np+p$. $$15\\cdot0.3-0.7 = 3.8,\\quad 15\\cdot0.3+0.3=4.8.$$ Целые значения в интервале [3.8; 4.8]: 4 и 5." },
            { topic: "ДСВ", question: "Закон распределения дискретной случайной величины X задан таблично (значения: 1, 2, 3; вероятности: 0.2, 0.5, 0.3). Найти математическое ожидание M(X) и дисперсию D(X).", answer: "$M(X)=2.1$, $D(X)=0.49$", solution: "$$M(X)=1\\cdot0.2+2\\cdot0.5+3\\cdot0.3=0.2+1.0+0.9=2.1.$$ $$M(X^2)=1^2\\cdot0.2+2^2\\cdot0.5+3^2\\cdot0.3=0.2+2.0+2.7=4.9.$$ $$D(X)=M(X^2)-(M(X))^2=4.9-2.1^2=4.9-4.41=0.49.$$" },
            { topic: "НСВ", question: "Задана плотность распределения непрерывной случайной величины $f(x)=2x$ на отрезке $[0,1]$. Найти математическое ожидание $M(X)$.", answer: "$\\frac{2}{3}$", solution: "$$M(X)=\\int_0^1 x\\cdot f(x)\\,dx = \\int_0^1 2x^2 dx = \\left[\\frac{2x^3}{3}\\right]_0^1 = \\frac{2}{3}.$$" },
            { topic: "Нормальное распределение", question: "Случайная величина X распределена по стандартному нормальному закону с математическим ожиданием 0 и средним квадратическим отклонением 1. Найдите вероятность того, что значение этой величины попадет в интервал от -1 до 1.", answer: "0.6826", solution: "Используем функцию Лапласа $\\Phi(x)$: $$P(-1 < X < 1) = \\Phi(1)-\\Phi(-1)=2\\Phi(1)=2\\cdot0.34134=0.68268 \\approx 0.6827.$$" },
            { topic: "Нормальное распределение", question: "Случайная величина X подчиняется нормальному закону распределения с математическим ожиданием 30 и стандартным отклонением 10. Найдите вероятность того, что её значение окажется в пределах от 10 до 50.", answer: "0.9544", solution: "Нормируем границы интервала и используем функцию Лапласа: $$P(10 < X < 50) = \\Phi\\left(\\frac{50-30}{10}\\right)-\\Phi\\left(\\frac{10-30}{10}\\right)=\\Phi(2)-\\Phi(-2)=2\\Phi(2)=2\\cdot0.4772=0.9544.$$" },
            { topic: "ЦПТ", question: "Вычисляется среднее арифметическое 3200 независимых случайных величин с математическим ожиданием 3 и дисперсией 2. Найти вероятность того, что это выборочное среднее попадет в интервал (2.95; 3.075).", answer: "≈ 0.9759", solution: "Стандартное отклонение среднего: $$\\sigma_{\\bar X}=\\sqrt{\\frac{2}{3200}}=0.025.$$ По ЦПТ: $$P = \\Phi\\left(\\frac{3.075-3}{0.025}\\right)-\\Phi\\left(\\frac{2.95-3}{0.025}\\right)=\\Phi(3)-\\Phi(-2)=0.49865+0.47725=0.9759.$$" },

        // Рендер задач по темам
        function renderTopicTasks() {
            const container = document.getElementById('tasksGrid');
            container.innerHTML = '';
            topicTasks.forEach((task, idx) => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.style.animationDelay = `${idx * 0.08}s`; 
                card.innerHTML = `
                    <div class="task-topic">${task.topic}</div>
                    <div class="task-question">${task.question}</div>
                    <div class="btn-group">
                        <button class="btn btn-primary show-answer" data-idx="${idx}">Показать ответ</button>
                        <button class="btn btn-outline show-solution" data-idx="${idx}">Решение</button>
                    </div>
                    <div class="task-answer" id="answer-${idx}"><strong>Ответ:</strong> ${task.answer}</div>
                    <div class="task-solution" id="solution-${idx}"><strong>Пошаговое решение:</strong><br>${task.solution}</div>
                `;
                container.appendChild(card);
            });
            attachTaskEvents();
        }

        function attachTaskEvents() {
            document.querySelectorAll('#tasksGrid .show-answer').forEach(btn => {
                btn.addEventListener('click', () => {

                    if(ansDiv) {
                        ansDiv.classList.toggle('show');
                        setTimeout(() => renderMath(), 50);
                    }
                });
            });
            document.querySelectorAll('#tasksGrid .show-solution').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = btn.getAttribute('data-idx');
                    const solDiv = document.getElementById(`solution-${idx}`);
                    if(solDiv) {
                        solDiv.classList.toggle('show');
                        setTimeout(() => renderMath(), 50);
                    }
                });
            });
        }

        // ========== КАЛЬКУЛЯТОР ВЕРОЯТНОСТЕЙ ==========
        function parseProbability(text) {
            text = text.toLowerCase();
            if(text.includes('шар') && (text.includes('бел') || text.includes('черн'))) {
                let white = parseInt(text.match(/(\d+)\s+бел/)?.[1]) || 5;
                let black = parseInt(text.match(/(\d+)\s+черн/)?.[1]) || 3;
                let draw = parseInt(text.match(/вынима[ею]\s+(\d+)/)?.[1]) || 2;
                let prob = C(white, draw) / C(white+black, draw);
                return { prob, formula: `$$P = \\frac{C_{${white}}^{${draw}}}{C_{${white+black}}^{${draw}}} = \\frac{${C(white,draw)}}{${C(white+black,draw)}} = ${prob.toFixed(6)}$$` };
            }
            if(text.includes('кости') || text.includes('кубик')) {
                let sum = parseInt(text.match(/сумм[аы]\s+(\d+)/)?.[1]) || 7;
                let fav = 0;
                for(let i=1;i<=6;i++) for(let j=1;j<=6;j++) if(i+j===sum) fav++;
                let prob = fav/36;
                return { prob, formula: `$$P = \\frac{${fav}}{36} = ${prob.toFixed(6)}$$` };
            }
            if(text.includes('колод') || text.includes('карт')) {
                let draw = parseInt(text.match(/вынима[ею]\s+(\d+)/)?.[1]) || 3;
                let prob = 1 - C(32, draw)/C(36, draw);
                return { prob, formula: `$$P(\\text{хотя бы один туз}) = 1 - \\frac{C_{32}^{${draw}}}{C_{36}^{${draw}}} = 1 - \\frac{${C(32,draw)}}{${C(36,draw)}} = ${prob.toFixed(6)}$$` };
            }
            if(text.includes('монет')) {
                let n = parseInt(text.match(/броса[ею]\s+(\d+)/)?.[1]) || 10;
                let k = parseInt(text.match(/(\d+)\s+орл/)?.[1]) || 5;
                let prob = C(n, k) * Math.pow(0.5, n);
                return { prob, formula: `$$P = C_{${n}}^{${k}} \\cdot (0.5)^{${n}} = \\frac{${C(n,k)}}{${Math.pow(2,n)}} = ${prob.toFixed(6)}$$` };
            }
            return null;
        }

        const calcTypeSelect = document.getElementById('calcType');
        const dynamicDiv = document.getElementById('calcDynamicInputs');
        
        function updateDynamicInputs() {
            const type = calcTypeSelect.value;
            if(type === 'balls') {
                dynamicDiv.innerHTML = `<div style="display:flex; gap:1rem; flex-wrap:wrap;"><input type="number" id="whiteBalls" placeholder="Белых (шт)" value="5" class="calc-input" style="flex:1;"><input type="number" id="blackBalls" placeholder="Черных (шт)" value="3" class="calc-input" style="flex:1;"><input type="number" id="drawBalls" placeholder="Вынимаем (шт)" value="2" class="calc-input" style="flex:1;"></div>`;
            } else if(type === 'dice') {
                dynamicDiv.innerHTML = `<input type="number" id="targetSum" placeholder="Целевая сумма очков" value="7" class="calc-input">`;
            } else if(type === 'cards') {
                dynamicDiv.innerHTML = `<div style="display:flex; gap:1rem;"><input type="number" id="cardsDraw" placeholder="Вынимаем карт" value="3" class="calc-input" style="flex:1;"><select id="cardsCond" class="calc-select" style="flex:2;"><option value="ace">Хотя бы один туз</option><option value="suit">Все одной масти</option></select></div>`;
            } else if(type === 'coin') {
                dynamicDiv.innerHTML = `<div style="display:flex; gap:1rem;"><input type="number" id="coinFlips" placeholder="Количество бросков" value="10" class="calc-input"><input type="number" id="coinHeads" placeholder="Количество орлов" value="5" class="calc-input"></div>`;
            } else if(type === 'bernoulli') {
                dynamicDiv.innerHTML = `<div style="display:flex; gap:1rem;"><input type="number" id="bernN" placeholder="n (всего)" value="10" class="calc-input"><input type="number" id="bernP" placeholder="p (вероятность)" step="0.01" value="0.5" class="calc-input"><input type="number" id="bernK" placeholder="k (успехов)" value="5" class="calc-input"></div>`;
            } else if(type === 'bayes') {
                dynamicDiv.innerHTML = `<div style="display:flex; gap:1rem; flex-wrap:wrap;"><input type="number" id="bayesP1" placeholder="P(H1)" value="0.4" step="0.01" class="calc-input" style="flex:1;"><input type="number" id="bayesPA1" placeholder="P(A|H1)" value="0.03" step="0.01" class="calc-input" style="flex:1;"><input type="number" id="bayesP2" placeholder="P(H2)" value="0.6" step="0.01" class="calc-input" style="flex:1;"><input type="number" id="bayesPA2" placeholder="P(A|H2)" value="0.02" step="0.01" class="calc-input" style="flex:1;"></div>`;
            }
        }
        calcTypeSelect.addEventListener('change', updateDynamicInputs);
        updateDynamicInputs();

        function calculateByType() {
            const type = calcTypeSelect.value;
            let result = 0, formula = '';
            if(type === 'balls') {
                let w = +document.getElementById('whiteBalls').value, b = +document.getElementById('blackBalls').value, d = +document.getElementById('drawBalls').value;
                result = C(w,d)/C(w+b,d);
                formula = `$$P = \\frac{C_{${w}}^{${d}}}{C_{${w+b}}^{${d}}} = \\frac{${C(w,d)}}{${C(w+b,d)}} = ${result.toFixed(6)}$$`;
            } else if(type === 'dice') {
                let sum = +document.getElementById('targetSum').value;
                let fav=0; for(let i=1;i<=6;i++) for(let j=1;j<=6;j++) if(i+j===sum) fav++;
                result = fav/36;
                formula = `$$P = \\frac{${fav}}{36} = ${result.toFixed(6)}$$`;
            } else if(type === 'cards') {
                let draw = +document.getElementById('cardsDraw').value;
                let cond = document.getElementById('cardsCond').value;
                if(cond === 'ace') {
                    result = 1 - C(32,draw)/C(36,draw);
                    formula = `$$P(\\text{хотя бы один туз}) = 1 - \\frac{C_{32}^{${draw}}}{C_{36}^{${draw}}} = 1 - \\frac{${C(32,draw)}}{${C(36,draw)}} = ${result.toFixed(6)}$$`;
                } else {
                    result = 4*C(13,draw)/C(36,draw);
                    formula = `$$P(\\text{все одной масти}) = \\frac{4\\cdot C_{13}^{${draw}}}{C_{36}^{${draw}}} = \\frac{${4*C(13,draw)}}{${C(36,draw)}} = ${result.toFixed(6)}$$`;
                }
            } else if(type === 'coin') {
                let n = +document.getElementById('coinFlips').value, k = +document.getElementById('coinHeads').value;
                result = C(n,k)*Math.pow(0.5,n);
                formula = `$$P = C_{${n}}^{${k}} \\cdot (0.5)^{${n}} = \\frac{${C(n,k)}}{${Math.pow(2,n)}} = ${result.toFixed(6)}$$`;
            } else if(type === 'bernoulli') {
                let n = +document.getElementById('bernN').value, p = +document.getElementById('bernP').value, k = +document.getElementById('bernK').value;
                result = C(n,k)*Math.pow(p,k)*Math.pow(1-p,n-k);
                formula = `$$P = C_{${n}}^{${k}} \\cdot ${p}^{${k}} \\cdot ${(1-p).toFixed(3)}^{${n-k}} = ${result.toFixed(6)}$$`;
            } else if(type === 'bayes') {
                let pH1 = +document.getElementById('bayesP1').value, pA1 = +document.getElementById('bayesPA1').value, pH2 = +document.getElementById('bayesP2').value, pA2 = +document.getElementById('bayesPA2').value;
                let pA = pH1*pA1 + pH2*pA2;
                result = (pH1*pA1)/pA;
                formula = `$$P(A) = ${pH1}\\cdot${pA1} + ${pH2}\\cdot${pA2} = ${pA.toFixed(6)}$$ $$P(H_1|A) = \\frac{${pH1}\\cdot${pA1}}{${pA.toFixed(6)}} = ${result.toFixed(6)}$$`;
            }
            
            const calcResultDiv = document.getElementById('calcResult');
            calcResultDiv.innerHTML = `<div style="font-size:1.2rem; font-weight:600; color:var(--text-main); margin-bottom: 1rem;">Вероятность: ${result.toFixed(6)}</div><div style="font-weight:500; margin-bottom: 0.5rem;">Решение:</div>${formula}`;
            setTimeout(() => renderMath(), 50);
        }

        document.getElementById('calcBtn').addEventListener('click', () => {
            const text = document.getElementById('calcTextInput').value;
            const parsed = parseProbability(text);
            const calcResultDiv = document.getElementById('calcResult');
            
            if(parsed) {
                calcResultDiv.innerHTML = `<div style="font-size:1.2rem; font-weight:600; color:var(--text-main); margin-bottom: 1rem;">Вероятность: ${parsed.prob.toFixed(6)}</div><div style="font-weight:500; margin-bottom: 0.5rem;">Решение:</div>${parsed.formula}`;
            } else {
                calcResultDiv.innerHTML = '<span style="color:#D32F2F;">Не удалось распознать задачу. Попробуйте описать ее иначе или используйте шаблоны ниже.</span>';
            }
            setTimeout(() => renderMath(), 50);
        });
        
        document.getElementById('calcTypeBtn').addEventListener('click', calculateByType);

        // Переключение вкладок
        const tabs = document.querySelectorAll('.tab-btn');
        const panes = document.querySelectorAll('.tab-pane');
        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                tabs.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                panes.forEach(pane => pane.classList.remove('active'));
                document.getElementById(`${tabId}-tab`).classList.add('active');
                setTimeout(() => renderMath(), 100);
            });
        });

        // Инициализация
        renderTopicTasks();
        renderHintTasks();
        setTimeout(() => renderMath(), 200);
    </script>
</body>
</html>
